name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npx ng test odata-observable-store --watch=false --browsers=ChromeHeadlessCI

      - name: Build
        run: npx ng build odata-observable-store --configuration production

      - name: Publish
        run: npm publish --provenance --access public
        working-directory: dist/odata-observable-store
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "## @lucasheight/odata-observable-store ${VERSION}

          📦 **npm:** https://www.npmjs.com/package/@lucasheight/odata-observable-store/v/${VERSION#v}"
